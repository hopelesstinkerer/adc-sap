version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'sunday'
    labels:
      - 'type:chore'
      - 'scope:repo'
    commit-message:
      prefix: 'chore(deps)'
    pull-request-title: 'chore(deps): bump ${dependencyName} from ${oldVersion} to ${newVersion}'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'sunday'
    labels:
      - 'type:chore'
      - 'scope:repo'
    commit-message:
      prefix: 'chore(deps)'
    pull-request-title: 'chore(deps): bump ${dependencyName} from ${oldVersion} to ${newVersion}'
